{% extends "base.html" %}

{% block title %}Login - Phishing Website Detection System{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 0 auto;">
    <h1 style="margin: 0 0 4px 0; font-size: 24px;">Sign in</h1>
    <p style="margin: 0 0 16px 0; color: var(--muted);">Access the phishing detector.</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" style="display: grid; gap: 12px;">
        <input type="email" name="email" class="form-control" placeholder="Email" required />
        <input type="password" name="password" class="form-control" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div style="margin-top: 12px; color: var(--muted); font-size: 13px; text-align: center;">
        No account? <a href="{{ url_for('signup') }}">Sign up</a> · <a href="{{ url_for('home') }}">Home</a>
    </div>
</div>
{% endblock %}
